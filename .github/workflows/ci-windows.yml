name: CI Windows

on:
  push:
  pull_request:

jobs:
  warmup:
    name: windows-warmup-${{ matrix.triplet }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - triplet: x64-windows

    defaults:
      run:
        shell: bash

    env:
      ZF_BUILD_JOBS: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/vcpkg/archives
            .tools/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('.vcpkg-version', 'vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.triplet }}-

      - name: Bootstrap vcpkg
        run: ./scripts/vcpkg.sh bootstrap

      - name: Warm up triplet dependencies
        run: |
          mkdir -p .cache/vcpkg/archives
          cmake --preset ${{ matrix.triplet }}-release

  windows-msvc:
    needs: warmup
    name: windows-msvc-${{ matrix.preset }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: x64-windows-release
            triplet: x64-windows

    defaults:
      run:
        shell: bash

    env:
      ZF_BUILD_JOBS: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/vcpkg/archives
            .tools/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('.vcpkg-version', 'vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.triplet }}-

      - name: Bootstrap vcpkg
        run: ./scripts/vcpkg.sh bootstrap

      - name: Build
        run: ./scripts/build.sh ${{ matrix.preset }}

      - name: Test
        run: ./scripts/test.sh ${{ matrix.preset }}

      - name: Package release components
        if: matrix.preset == 'x64-windows-release'
        run: |
          ./scripts/make-package.sh agent server installer --preset x64-windows-release --out "$RUNNER_TEMP/packages" --zip --no-build

      - name: Inspect release binaries
        if: matrix.preset == 'x64-windows-release'
        run: ./scripts/check.sh binaries --preset x64-windows-release

      - name: Inspect release packages
        if: matrix.preset == 'x64-windows-release'
        run: |
          source ./scripts/lib/common.sh
          arch="$(zf_preset_manifest_arch "${{ matrix.preset }}")"
          ./scripts/check.sh packages --platform windows --arch "$arch" --build-type release "$RUNNER_TEMP/packages"/*.zip
