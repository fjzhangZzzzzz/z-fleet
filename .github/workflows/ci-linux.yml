name: CI Linux

on:
  push:
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'tests/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.vcpkg-version'
      - '.github/workflows/ci-images.yml'
      - '.github/workflows/ci-linux.yml'
      - '.github/workflows/ci-linux-core.yml'
      - '.github/workflows/ci-linux-after-images.yml'
      - '.github/workflows/resolve-image-meta.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'tests/**'
      - 'scripts/**'
      - 'ci/docker/**'
      - 'ci/images/version.txt'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.vcpkg-version'
      - '.github/workflows/ci-images.yml'
      - '.github/workflows/ci-linux.yml'
      - '.github/workflows/ci-linux-core.yml'
      - '.github/workflows/ci-linux-after-images.yml'
      - '.github/workflows/resolve-image-meta.yml'

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_core: ${{ steps.gate.outputs.run_core }}

    steps:
      - name: Decide whether to run the Linux core workflow
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          run_core=true

          if [[ "$EVENT_NAME" == "push" ]]; then
            changed_files="$(python3 - <<'PY'
import json
import os

event_path = os.environ["EVENT_PATH"]
with open(event_path, "r", encoding="utf-8") as f:
    event = json.load(f)

files = set()
for commit in event.get("commits", []):
    files.update(commit.get("added", []))
    files.update(commit.get("modified", []))
    files.update(commit.get("removed", []))

for path in sorted(files):
    print(path)
PY
)"

            if printf '%s\n' "$changed_files" | grep -Eq '^(ci/docker/|ci/images/version\.txt$)'; then
              run_core=false
            fi
          fi

          echo "run_core=$run_core" >> "$GITHUB_OUTPUT"

  linux:
    needs: gate
    if: needs.gate.outputs.run_core == 'true'
    uses: ./.github/workflows/ci-linux-core.yml
    with:
      checkout_ref: ${{ github.sha }}
