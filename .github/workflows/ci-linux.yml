name: CI Linux

on:
  push:
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'tests/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.vcpkg-version'
      - '.github/workflows/ci-images.yml'
      - '.github/workflows/ci-linux.yml'
      - '.github/workflows/ci-linux-core.yml'
      - '.github/workflows/ci-linux-after-images.yml'
      - '.github/workflows/resolve-image-meta.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'tests/**'
      - 'scripts/**'
      - 'ci/docker/**'
      - 'ci/images/version.txt'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.vcpkg-version'
      - '.github/workflows/ci-images.yml'
      - '.github/workflows/ci-linux.yml'
      - '.github/workflows/ci-linux-core.yml'
      - '.github/workflows/ci-linux-after-images.yml'
      - '.github/workflows/resolve-image-meta.yml'

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_core: ${{ steps.gate.outputs.run_core }}

    steps:
      - name: Decide whether to run the Linux core workflow
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          run_core=true

          if [[ "$EVENT_NAME" == "push" ]]; then
            changed_files="$(
              python3 -c 'import json, os; event_path = os.environ.get("GITHUB_EVENT_PATH", ""); files = set(); event = json.load(open(event_path, "r", encoding="utf-8")) if event_path and os.path.exists(event_path) else {}; [files.update(commit.get(key, [])) for commit in event.get("commits", []) for key in ("added", "modified", "removed")]; print("\n".join(sorted(files)))'
            )"

            if printf '%s\n' "$changed_files" | grep -Eq '^(ci/docker/|ci/images/version\.txt$)'; then
              run_core=false
            fi
          fi

          echo "run_core=$run_core" >> "$GITHUB_OUTPUT"

  linux:
    needs: gate
    if: needs.gate.outputs.run_core == 'true'
    uses: ./.github/workflows/ci-linux-core.yml
    with:
      checkout_ref: ${{ github.sha }}
