name: CI Images

on:
  workflow_dispatch:
  push:
    paths:
      - 'ci/docker/**'
      - 'ci/images/version.txt'
      - '.github/workflows/ci-images.yml'

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read image version
        id: version
        run: |
          image_tag="$(tr -d '[:space:]' < ci/images/version.txt)"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

  build-images:
    needs: resolve-version
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: zfleet-builder
            dockerfile: ci/docker/builder/Dockerfile
          - name: zfleet-runtime-baseline
            dockerfile: ci/docker/runtime/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ needs.resolve-version.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
