name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-debug
          - os: ubuntu-latest
            preset: linux-release
          - os: windows-latest
            preset: windows-debug
          - os: windows-latest
            preset: windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/vcpkg/archives
            .tools/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('.vcpkg-version', 'vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.preset }}-
            vcpkg-${{ runner.os }}-

      - name: Build
        run: ./scripts/build.sh ${{ matrix.preset }}

      - name: Test
        run: ./scripts/test.sh ${{ matrix.preset }}
