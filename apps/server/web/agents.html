<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent 状态 | z-fleet</title>
  <link rel="stylesheet" href="/assets/management.css">
  <script defer src="/assets/management.js"></script>
</head>
<body data-page="agents">
  <div class="app-shell">
    <header class="shell-header">
      <a class="brand-block" href="/">
        <span class="brand-mark" aria-hidden="true">ZF</span>
        <span class="brand">
          <span class="brand-name">z-fleet</span>
          <span class="brand-copy">设备控制台</span>
        </span>
      </a>
      <nav><a href="/install">Agent 安装</a><a class="active" href="/agents">Agent 状态</a><a href="/admin/packages">安装包管理</a></nav>
    </header>
    <main class="page">
      <section class="page-header">
        <div>
          <p class="kicker">设备状态</p>
          <h1>Agent 状态</h1>
          <p class="page-intro">按状态、系统、架构和版本查看当前 fleet，点选单个 Agent 后进入详细资产与维护操作。</p>
        </div>
        <span class="status" data-status-for="agents" role="status" aria-live="polite"></span>
      </section>
      <section class="filters agent-filters-panel" data-agent-filters>
        <label class="search-field">搜索
          <input class="search" name="search" placeholder="搜索主机名或 Agent ID" aria-label="搜索主机名或 Agent ID">
        </label>
        <div class="filter-cluster">
          <span class="filter-label">状态</span>
          <div class="filter-chip-row" data-filter-group="status"></div>
        </div>
        <div class="filter-cluster">
          <span class="filter-label">系统</span>
          <div class="filter-chip-row" data-filter-group="os"></div>
        </div>
        <div class="filter-cluster">
          <span class="filter-label">架构</span>
          <div class="filter-chip-row" data-filter-group="arch"></div>
        </div>
        <div class="filter-select custom-select" data-version-filter>
          <span class="filter-label">版本</span>
          <button class="select-trigger" type="button" data-version-trigger aria-haspopup="listbox" aria-expanded="false">全部版本</button>
          <div class="select-menu" data-version-menu hidden></div>
        </div>
        <button class="button" type="button" data-reset-agent-filters>清空筛选</button>
      </section>
      <article class="panel table-panel">
        <table class="agent-table">
          <thead><tr><th>状态</th><th>主机名</th><th>系统</th><th>架构</th><th>当前版本</th><th>目标版本</th><th>Agent ID</th><th>最后在线</th></tr></thead>
          <tbody data-agent-list><tr><td colspan="8" class="muted">正在加载 Agent...</td></tr></tbody>
        </table>
      </article>
      <div class="drawer-backdrop" data-agent-backdrop hidden></div>
      <aside class="drawer" data-agent-detail aria-hidden="true">
        <button class="drawer-close" type="button" data-agent-close aria-label="关闭">关闭</button>
        <div data-agent-detail-body></div>
      </aside>
      <dialog data-maintenance-dialog>
        <form method="dialog" class="panel">
          <h3>维护操作</h3>
          <p class="muted" data-maintenance-agent></p>
          <label>操作
            <select data-maintenance-action>
              <option value="upgrade">发起升级</option>
              <option value="rollback">执行回滚</option>
            </select>
          </label>
          <label data-maintenance-package-row>版本
            <select data-maintenance-package></select>
          </label>
          <div class="fields">
            <button class="button primary" value="confirm" data-maintenance-confirm>确认</button>
            <button class="button" value="cancel">取消</button>
          </div>
        </form>
      </dialog>
    </main>
  </div>
</body>
</html>
