<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent 安装 | z-fleet</title>
  <link rel="stylesheet" href="/assets/management.css">
  <script defer src="/assets/management.js"></script>
</head>
<body data-page="install">
  <header class="shell-header">
    <a class="brand" href="/">z-fleet</a>
    <nav><a class="active" href="/install">Agent 安装</a><a href="/agents">Agent 状态</a><a href="/admin/packages">安装包管理</a></nav>
  </header>
  <main class="page">
    <div class="title-row"><div><p class="kicker">BOOTSTRAP</p><h1>Agent 安装</h1></div><span class="status" data-status-for="install">准备就绪</span></div>
    <section class="grid two install-grid">
      <article class="panel">
        <h2>推荐安装</h2>
        <p class="muted">使用当前推荐版本部署 Agent。执行命令前目标设备需已有 <code>zfleet_installer</code>。</p>
        <label>Server 控制地址<input name="control_url" data-control-url value="http://127.0.0.1:8081"></label>
        <dl class="release" data-install-release><dt>推荐版本</dt><dd>-</dd><dt>SHA-256</dt><dd>-</dd></dl>
      </article>
      <article class="panel terminal-panel">
        <div class="panel-heading"><h2>安装命令</h2><button class="button compact" type="button" data-copy-install disabled>复制命令</button></div>
        <button class="button primary" type="button" data-install-token-button>生成注册 token</button>
        <p class="secret" data-install-token-output>Token 仅在生成时展示一次。</p>
        <pre data-install-command><code>生成注册 token 后显示可执行命令。</code></pre>
      </article>
    </section>
  </main>
</body>
</html>
