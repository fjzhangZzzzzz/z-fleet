<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent 安装 | z-fleet</title>
  <link rel="stylesheet" href="/assets/admin.css">
  <script defer src="/assets/admin.js"></script>
</head>
<body data-page="install">
  <div class="app-shell">
    <header class="shell-header">
      <a class="brand-block" href="/">
        <span class="brand-mark" aria-hidden="true">ZF</span>
        <span class="brand">
          <span class="brand-name">z-fleet</span>
          <span class="brand-copy">设备控制台</span>
        </span>
      </a>
      <nav><a class="active" href="/install">Agent 安装</a><a href="/agents">Agent 状态</a><a href="/admin/packages">安装包管理</a></nav>
    </header>
    <main class="page">
      <section class="page-header">
        <div>
          <p class="kicker">安装引导</p>
          <h1>Agent 安装</h1>
          <p class="page-intro">选择目标平台和发布通道后，系统会直接生成安装命令。架构检测、安装包解析和版本选择都由脚本与后端自动完成。</p>
        </div>
        <span class="status" data-status-for="install" role="status" aria-live="polite"></span>
      </section>
      <section class="panel install-workbench">
        <div class="install-toolbar">
          <div class="install-inline-group" role="group" aria-labelledby="install-platform-title">
            <span class="install-inline-label" id="install-platform-title">选择平台</span>
            <div class="install-inline-options" data-install-platform-group>
              <button class="choice-chip active" type="button" data-install-platform value="linux" aria-pressed="true">Linux</button>
              <button class="choice-chip" type="button" data-install-platform value="windows" aria-pressed="false">Windows</button>
            </div>
          </div>
          <div class="install-inline-group" role="group" aria-labelledby="install-channel-title">
            <span class="install-inline-label" id="install-channel-title">选择通道</span>
            <div class="install-inline-options" data-install-channel-group>
              <button class="choice-chip active" type="button" data-install-channel value="stable" aria-pressed="true">稳定通道</button>
              <button class="choice-chip" type="button" data-install-channel value="candidate" aria-pressed="false">候选通道</button>
              <button class="choice-chip" type="button" data-install-channel value="dev" aria-pressed="false">开发通道</button>
            </div>
          </div>
          <div class="install-toolbar-actions">
            <button class="button primary" type="button" data-generate-install-command>生成安装命令</button>
          </div>
        </div>
        <p class="muted install-inline-note">脚本会在目标机器上自动识别架构，并下载当前平台与通道下的默认安装包。</p>
        <p class="secret" data-install-token-output>生成命令时会自动创建一次性注册凭证，明文不会单独展示给用户。</p>
        <div class="code-block">
          <div class="code-block-head">
            <span class="code-block-label" data-install-command-label>Linux · 稳定通道</span>
            <button class="code-copy-button" type="button" data-copy-install disabled>复制</button>
          </div>
          <pre data-install-command><code>选择平台和发布通道后，点击“生成安装命令”。</code></pre>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
