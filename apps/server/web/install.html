<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent 安装 | z-fleet</title>
  <link rel="stylesheet" href="/assets/management.css">
  <script defer src="/assets/management.js"></script>
</head>
<body data-page="install">
  <header class="shell-header">
    <a class="brand" href="/">z-fleet</a>
    <nav><a class="active" href="/install">Agent 安装</a><a href="/agents">Agent 状态</a><a href="/admin/packages">安装包管理</a></nav>
  </header>
  <main class="page">
    <div class="title-row"><div><p class="kicker">BOOTSTRAP</p><h1>Agent 安装</h1></div><span class="status" data-status-for="install">准备就绪</span></div>
    <section class="grid two">
      <article class="panel">
        <h2>安装目标</h2>
        <form class="fields" data-install-fields>
          <label>Channel<select name="channel"><option>stable</option><option>candidate</option><option>dev</option></select></label>
          <label>Platform<select name="platform"><option>linux</option><option>windows</option></select></label>
          <label>Architecture<select name="arch"><option>x86_64</option><option>arm64</option></select></label>
        </form>
        <dl class="release" data-install-release><dt>Published version</dt><dd>-</dd><dt>SHA-256</dt><dd>-</dd></dl>
      </article>
      <article class="panel terminal-panel">
        <h2>注册 Token 与命令</h2>
        <button class="button primary" type="button" data-install-token-button>生成注册 token</button>
        <p class="secret" data-install-token-output>Token 仅在生成时展示一次。</p>
        <pre data-install-command><code>请选择 channel 后生成安装命令。</code></pre>
      </article>
    </section>
  </main>
</body>
</html>
